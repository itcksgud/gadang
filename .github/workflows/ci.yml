name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build & test
        working-directory: Backend
        run: ./mvnw -B test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t gadang-backend ./Backend
      - name: Build ai-server image
        run: docker build -t gadang-ai-server ./ai-server
