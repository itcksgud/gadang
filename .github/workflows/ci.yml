name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    # contextLoads가 기동 시 schema.sql을 실행하므로 MySQL 필수 (Redis는 지연 연결이지만 안전빵)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gadang
          MYSQL_USER: gadang
          MYSQL_PASSWORD: gadang
        ports:
          - 3306:3306   # application.properties 기본값 localhost:3306에 맞춤
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=12
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379   # properties 기본값이 localhost:6380 (로컬 compose 포트와 동일)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build & test
        working-directory: Backend
        run: ./mvnw -B test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t gadang-backend ./Backend
      - name: Build ai-server image
        run: docker build -t gadang-ai-server ./ai-server
