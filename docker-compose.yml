# 가당 로컬 스택: MySQL + Redis + Spring 백엔드 + FastAPI RAG 서버
# 실행:  docker compose up -d --build
# 키:   루트 .env 에서 자동 로드 (.env 는 git 제외)

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gadang        # 기동 시 gadang DB 자동 생성
      MYSQL_USER: gadang
      MYSQL_PASSWORD: gadang
    ports:
      - "3307:3306"   # 호스트 3306은 로컬 MySQL이 사용 중 — Workbench에서 컨테이너 DB는 3307로 접속
    volumes:
      - mysql-data:/var/lib/mysql   # 컨테이너 재생성해도 데이터 유지
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # 호스트 6379는 다른 프로젝트 redis-db가 사용 중

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"   # S3 API (브라우저의 이미지 GET도 이 포트)
      - "9003:9001"   # 웹 콘솔
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 12

  ai-server:
    build: ./ai-server
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8001:8000"   # 호스트 8000은 다른 프로젝트 ai-service-app이 사용 중

  backend:
    build: ./Backend
    depends_on:
      mysql:
        condition: service_healthy   # MySQL이 살아난 뒤에 기동
      redis:
        condition: service_started
      ai-server:
        condition: service_started
      minio:
        condition: service_healthy   # 기동 시 버킷 생성/정책 적용이 있어 준비 후 시작
    environment:
      # Spring relaxed binding: SPRING_DATASOURCE_URL → spring.datasource.url 덮어씀
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gadang?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: gadang
      SPRING_DATASOURCE_PASSWORD: gadang
      RAG_BASE_URL: http://ai-server:8000
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      KAKAO_API_KEY: ${KAKAO_API_KEY:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      ODSAY_API_KEY: ${ODSAY_API_KEY:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      TOUR_API_KEY: ${TOUR_API_KEY:-}
      DATAGO_API_KEY: ${DATAGO_API_KEY:-}
      # .env 미설정 시 dev 기본값 (빈 문자열이면 HS256 키 길이 검증에서 기동 실패)
      JWT_SECRET: ${JWT_SECRET:-gadang-secret-key-for-development-only}
      # 게시글 이미지 — S3 호환 스토리지(MinIO). 운영 전환: S3_ENDPOINT 비우고 AWS 키/리전 지정
      STORAGE_MODE: s3
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_BASE_URL: http://localhost:9002/gadang-images   # 브라우저 접근 경로 (호스트 매핑 포트)
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    ports:
      - "8080:8080"

volumes:
  mysql-data:
  minio-data:
